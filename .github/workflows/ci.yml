name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install package and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -e ".[dev]"

      - name: Lint with flake8
        run: flake8 src/ tests/ --max-line-length=100 --extend-ignore=E203,W503

      - name: Check formatting with black
        run: black --check --line-length=100 src/ tests/

      - name: Check imports with isort
        run: isort --check-only --profile black --line-length=100 src/ tests/

      - name: Static type checking with mypy
        run: mypy src/ tests/

      - name: Smoke test — CLI help
        run: python cli.py --help

      - name: Smoke test — python -m src
        run: python -m src --help

      - name: Smoke test — all module imports
        run: python -c "from src.analysis.run_sql import STATEMENT_RE; from src.analysis.metrics import run_all; from src.analysis.viz import run_all as viz_all; from src.analysis.profiling import run_all as profile_all; from src.datamarts.build_datamarts import run_all as dm_all; print('All imports OK')"

      - name: Run tests
        run: pytest --cov=src/ --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
